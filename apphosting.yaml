# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1
  # For Genkit and AI flows, we recommend a slightly higher timeout
  timeoutSeconds: 60

# Environment variables for production.
# Note: Ensure you have added the GEMINI_API_KEY to Secret Manager in your Google Cloud project
# and granted the App Hosting service account access to it.
env:
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
